<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerología PRO 3.0 - Sistema Experto</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); margin-bottom: 20px; }
        
        /* Bloqueo */
        #bloqueo { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .lock-card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; width: 80%; border: 1px solid #334155; }
        
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--accent); font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        
        .lottery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .num-box { background: #334155; padding: 15px; border-radius: 10px; text-align: center; border-left: 4px solid var(--gold); }
        .num-label { font-size: 0.7rem; color: #94a3b8; display: block; margin-bottom: 5px; }
        .num-value { font-size: 1.4rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; }
        
        .badge { background: #3b82f6; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
        .btn-ws { background: #25d366; text-decoration: none; display: block; padding: 10px; border-radius: 8px; color: white; margin-top: 15px; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="lock-card">
        <h2 style="color: var(--gold)">🔐 SISTEMA PRIVADO</h2>
        <p>Numerología PRO 3.0 v.Experto</p>
        <input type="password" id="pass" placeholder="Código de Acceso">
        <button onclick="verificar()">DESBLOQUEAR SISTEMA</button>
        <a href="https://wa.me/57TU_NUMERO_AQUI" class="btn-ws">SOLICITAR ACCESO (NEQUI)</a>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="card">
        <h2 style="margin-top:0; color: var(--accent);">📊 Análisis Técnico Colombiano</h2>
        <label>Seleccione Lotería / Sorteo:</label>
        <select id="loteriaSel">
            </select>
        
        <label>Resultados de 4 Cifras (Opcional):</label>
        <input type="number" id="lastResult" placeholder="Ej: 1234">
        
        <button onclick="ejecutarAnalisis()">CALCULAR FRECUENCIA TESLA</button>
    </div>

    <div id="resultadosArea" style="display:none;">
        <h3 style="text-align:center;">🎯 COMBINACIONES MÁS FUERTES</h3>
        <div class="lottery-grid" id="gridCombinaciones">
            </div>
    </div>
</div>

<script>
    const PATRONES = {
        "Dorado": 469146, "Astro": 11296, "Chontico": 38652936, "Paisita": 71919121,
        "Cundinamarca": 3364951418131, "Cruz Roja": 3298266151, "Valle": 41635,
        "Bogotá": 2647241, "Medellín": 45355495, "Boyacá": 267131, "Tolima": 2649311,
        "Huila": 389311, "Meta": 4511, "Manizales": 4199181351, "Quindío": 8395946,
        "Santander": 1192464552, "Risaralda": 991191241, "Cauca": 31331,
        "Cafeterito": 31552699246, "Saman": 11914, "Sinuano": 19531156, "Caribeña": 31992425,
        "Pijao Oro": 7911615, "Motilón": 46293956, "Fantástica": 61921193141,
        "Antioqueñita": 15696485149141, "Cash Three": 31198285, "Play Four": 74194665, "Culona": 33965
    };

    // Poblar Selector
    const sel = document.getElementById('loteriaSel');
    Object.keys(PATRONES).forEach(l => {
        let opt = document.createElement('option');
        opt.value = l; opt.innerText = l;
        sel.appendChild(opt);
    });

    function verificar() {
        if(document.getElementById('pass').value.toUpperCase() === "TESLA369") {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else { alert("Clave inválida"); }
    }

    function manipularCifra(numStr, op) {
        return numStr.split('').map(n => {
            let res = op === 'suma' ? parseInt(n) + 1 : parseInt(n) - 1;
            if (res > 9) return 0;
            if (res < 0) return 9;
            return res;
        }).join('');
    }

    function aplicarTesla(numStr, factor) {
        return numStr.split('').map(n => (parseInt(n) + factor) % 10).join('');
    }

    function ejecutarAnalisis() {
        const lot = document.getElementById('loteriaSel').value;
        const dia = new Date().getDate();
        const patron = PATRONES[lot];
        
        // Paso 2: División y tomar 4 cifras antes del punto
        let base = Math.floor(patron / dia).toString().slice(-4).padStart(4, '0');
        
        // Paso 3: Resta y Suma posicional
        let atras = manipularCifra(base, 'resta');
        let adelante = manipularCifra(base, 'suma');

        // Generar pool de números según tu ejemplo (mezcla de posiciones)
        // Ejemplo: 7566, 6455... basado en los resultados de suma/resta
        let pool = [
            adelante[2]+adelante[3]+atras[1]+atras[1], // Simulación de tu patrón de mezcla
            atras[1]+atras[2]+adelante[0]+adelante[0],
            atras[0]+atras[2]+adelante[1]+adelante[1],
            base[0]+base[1]+adelante[2]+adelante[3]
        ];

        // Paso 4: Metodo Tesla 3-6-9
        let finales = [];
        finales.push(aplicarTesla(base, 3));
        finales.push(aplicarTesla(base, 6));
        finales.push(aplicarTesla(base, 9));
        
        // Agregar los del pool
        finales = [...finales, ...pool].slice(0, 6);

        // Renderizar
        const grid = document.getElementById('gridCombinaciones');
        grid.innerHTML = "";
        finales.forEach((n, i) => {
            grid.innerHTML += `
                <div class="num-box">
                    <span class="num-label">FUERZA ${i+1}</span>
                    <span class="num-value">${n}</span>
                </div>`;
        });
        document.getElementById('resultadosArea').style.display = 'block';
    }
</script>

</body>
</html>
