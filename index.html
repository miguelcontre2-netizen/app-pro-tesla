<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerología PRO 3.0</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        button { background: #10b981; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; background: #0f172a; color: #10b981; border: 1px solid #334155; border-radius: 8px; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .result { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .num { background: #334155; padding: 10px; border-radius: 5px; color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Numerología PRO 3.0</h1>
        <p>Pega aquí los últimos resultados para analizar:</p>
        <textarea id="datos" rows="4" placeholder="Ejemplo: 1234, 5678, 9012..."></textarea>
        <button onclick="analizar()">GENERAR ANÁLISIS TÉCNICO</button>
    </div>
    <div class="card">
        <h3>🎯 SUGERENCIAS FUERTES</h3>
        <div id="resultados" class="result"></div>
    </div>
    <script>
        function analizar() {
            const res = document.getElementById('resultados');
            res.innerHTML = "";
            for(let i=0; i<6; i++) {
                let n = Math.floor(1000 + Math.random() * 9000);
                res.innerHTML += `<div class="num">${n}</div>`;
            }
        }
    </script>
</body>
</html>
