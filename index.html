<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerología PRO 3.0 - Sistema Experto v4.0</title>
    <style>
        :root { --bg: #070b14; --card: #111827; --accent: #10b981; --gold: #f59e0b; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #1f2937; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* Bloqueo */
        #bloqueo { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .lock-card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; width: 85%; border: 2px solid var(--gold); }
        
        select, input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #374151; background: #070b14; color: white; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--accent); font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { filter: brightness(1.2); }
        
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .num-card { background: linear-gradient(145deg, #1f2937, #111827); padding: 18px; border-radius: 12px; text-align: center; border-top: 3px solid var(--gold); }
        .num-label { font-size: 0.65rem; color: #94a3b8; display: block; margin-bottom: 5px; font-weight: bold; }
        .num-val { font-size: 1.6rem; font-weight: 900; color: var(--gold); letter-spacing: 3px; }
        
        .historial-area { font-size: 0.8rem; background: #000; padding: 10px; border-radius: 8px; max-height: 100px; overflow-y: auto; color: #10b981; font-family: monospace; margin-top: 10px; }
        .btn-ws { background: #25d366; text-decoration: none; display: block; padding: 12px; border-radius: 10px; color: white; margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="lock-card">
        <h2 style="color: var(--gold); margin: 0;">🔐 SISTEMA PRO 3.0</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Análisis Cuántico de Loterías</p>
        <input type="password" id="pass" placeholder="Ingresar Código VIP">
        <button onclick="verificar()">ACCEDER AL ANALIZADOR</button>
        <a href="https://wa.me/57TU_NUMERO" class="btn-ws">ADQUIRIR LICENCIA (NEQUI)</a>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="card">
        <h2 style="margin:0; color: var(--accent);">🎱 Generador Experto</h2>
        <label>Lotería / Sorteo:</label>
        <select id="lotSelect"></select>
        
        <label>Añadir Resultado al Historial (4 cifras):</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="histIn" placeholder="Ej: 5802">
            <button style="width: 30%;" onclick="addHistorial()">+</button>
        </div>
        
        <div class="historial-area" id="histLog">Historial vacío (Carga últimos resultados)...</div>
        
        <button onclick="realizarProyeccion()" style="margin-top: 20px; background: var(--gold); color: black;">OBTENER 6 NÚMEROS DE ORO</button>
    </div>

    <div id="resFinal" style="display:none;">
        <h3 style="text-align:center;">🏆 SUGERENCIAS ALTA PROBABILIDAD</h3>
        <div class="results-grid" id="grid"></div>
        <p style="font-size: 0.7rem; text-align:center; opacity:0.6; margin-top: 15px;">Filtros aplicados: Tesla 3-6-9, Regla 80/20 Paridad y Análisis de Unidad.</p>
    </div>
</div>

<script>
    const PATRONES = {
        "Dorado": 469146, "Astro": 11296, "Chontico": 38652936, "Paisita": 71919121,
        "Cundinamarca": 3364951418131, "Cruz Roja": 3298266151, "Valle": 41635,
        "Bogotá": 2647241, "Medellín": 45355495, "Boyacá": 267131, "Tolima": 2649311,
        "Huila": 389311, "Meta": 4511, "Manizales": 4199181351, "Quindío": 8395946,
        "Santander": 1192464552, "Risaralda": 991191241, "Cauca": 31331,
        "Cafeterito": 31552699246, "Saman": 11914, "Sinuano": 19531156, "Caribeña": 31992425,
        "Pijao Oro": 7911615, "Motilón": 46293956, "Fantástica": 61921193141,
        "Antioqueñita": 15696485149141, "Cash Three": 31198285, "Play Four": 74194665, "Culona": 33965
    };

    let historial = [];

    // Poblar Selector
    const sel = document.getElementById('lotSelect');
    Object.keys(PATRONES).sort().forEach(l => {
        let opt = document.createElement('option');
        opt.value = l; opt.innerText = l;
        sel.appendChild(opt);
    });

    function verificar() {
        if(document.getElementById('pass').value.toUpperCase() === "TESLA369") {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else { alert("Código incorrecto"); }
    }

    function addHistorial() {
        const val = document.getElementById('histIn').value;
        if(val.length === 4) {
            historial.unshift(val);
            if(historial.length > 30) historial.pop();
            document.getElementById('histLog').innerText = historial.join(" | ");
            document.getElementById('histIn').value = "";
        }
    }

    // Lógica Experta de Filtros
    function cumpleFiltros(num) {
        let digitos = num.split('').map(Number);
        let pares = digitos.filter(d => d % 2 === 0).length;
        let impares = 4 - pares;
        
        // Regla 80% (Paso 6): 1-3, 3-1 o 2-2
        let reglaParidad = (pares >= 1 && pares <= 3);
        
        // Regla Altos/Bajos (Paso 7): Altos (6-9), Bajos (0-4)
        let altos = digitos.filter(d => d >= 5).length;
        let bajos = 4 - altos;
        let reglaAltos = (altos >= 1 && altos <= 3); 

        return reglaParidad && reglaAltos;
    }

    function realizarProyeccion() {
        const lot = document.getElementById('lotSelect').value;
        const dia = new Date().getDate();
        const patron = PATRONES[lot];
        
        // Paso 2: División
        let base = Math.floor(patron / dia).toString().slice(-4).padStart(4, '0');
        
        let sugerencias = [];
        let intentos = 0;

        while(sugerencias.length < 6 && intentos < 500) {
            intentos++;
            let nBase = "";
            
            // Aplicar Tesla 3-6-9 aleatoriamente a la base del patrón
            let factor = [3, 6, 9][Math.floor(Math.random()*3)];
            nBase = base.split('').map(d => (parseInt(d) + factor) % 10).join('');

            // Pequeña mutación basada en el historial si existe
            if(historial.length > 0) {
                let h = historial[Math.floor(Math.random()*historial.length)];
                nBase = nBase.substring(0,2) + h.substring(2,4);
            }

            if(cumpleFiltros(nBase) && !sugerencias.includes(nBase)) {
                sugerencias.push(nBase);
            }
        }

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        sugerencias.forEach((n, i) => {
            grid.innerHTML += `
                <div class="num-card">
                    <span class="num-label">COMBINACIÓN FUERTE ${i+1}</span>
                    <span class="num-val">${n}</span>
                </div>`;
        });
        document.getElementById('resFinal').style.display = 'block';
    }
</script>
</body>
</html>
