<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EXPERTO ACC v5.0 | Quantum Numerology</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #05070a; 
            --panel: rgba(17, 24, 39, 0.8); 
            --accent: #10b981; 
            --gold: #f59e0b; 
            --neon-blue: #00d4ff;
            --text: #f0f6fc; 
        }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
            display: flex; justify-content: center; padding: 20px;
        }
        .container { width: 100%; max-width: 600px; }
        
        /* Glassmorphism Card */
        .glass-card { 
            background: var(--panel); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        /* Bloqueo VIP */
        #bloqueo { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .lock-box { text-align: center; border: 1px solid var(--gold); padding: 40px; border-radius: 30px; background: #0b0f1a; }

        h1, h2 { text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .status-bar { font-size: 0.7rem; color: var(--accent); text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px var(--accent); }

        select, input, button { 
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; 
            border: 1px solid #30363d; background: #0d1117; color: white; 
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        button { 
            background: linear-gradient(45deg, var(--accent), #059669); 
            border: none; cursor: pointer; font-weight: 700; color: #000;
        }
        button:active { transform: scale(0.98); }

        .historial-box { 
            background: #000; padding: 12px; border-radius: 10px; 
            border: 1px solid var(--accent); font-size: 0.8rem; height: 60px; overflow-y: auto; color: var(--accent);
        }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .num-card { 
            background: rgba(255,255,255,0.03); border-left: 4px solid var(--gold); 
            padding: 20px; border-radius: 12px; text-align: center;
            transition: 0.5s;
        }
        .num-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        .num-val { font-size: 2rem; font-weight: 800; color: var(--gold); display: block; }
        
        .loader { display: none; text-align: center; color: var(--neon-blue); font-size: 0.8rem; margin: 20px 0; }
        
        .badge-premium { background: var(--gold); color: black; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="lock-box">
        <h2 style="color: var(--gold);">CRYPTO-ANALYZER v5.0</h2>
        <p style="opacity: 0.6;">AUTENTICACIÓN REQUERIDA</p>
        <input type="password" id="pass" placeholder="TOKEN DE ACCESO VIP">
        <button onclick="verificar()">DESBLOQUEAR ALGORITMO</button>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="glass-card">
        <div class="status-bar">● NÚCLEO DE CÁLCULO ACTIVO: CONVERGENCIA CUATERNARIA</div>
        <h2>PROYECCIÓN <span class="badge-premium">PREMIUM</span></h2>
        
        <label style="font-size: 0.8rem; opacity: 0.7;">SELECCIONAR ENTIDAD DE SORTEO:</label>
        <select id="lotSelect"></select>
        
        <label style="font-size: 0.8rem; opacity: 0.7;">HISTORIAL DE ÚLTIMOS CIERRES:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="histIn" placeholder="Ejem: 8049" style="flex-grow: 1;">
            <button style="width: 60px;" onclick="addHistorial()">+</button>
        </div>
        <div class="historial-box" id="histLog">Esperando datos de entrada...</div>

        <button onclick="procesarCalculo()" style="margin-top: 25px; background: var(--gold);">
            EJECUTAR ANALÍTICA DE ALTA PRECISIÓN
        </button>

        <div id="loader" class="loader">CALIBRANDO FRECUENCIAS TESLA... 3... 6... 9...</div>
    </div>

    <div id="resFinal" style="display:none;">
        <h3 style="text-align:center; color: var(--neon-blue);">CONVERGENCIAS DETECTADAS</h3>
        <div class="results-grid" id="grid"></div>
        <p style="font-size: 0.6rem; text-align:center; opacity:0.4; margin-top: 20px;">
            Algoritmo: ACC-v5 + Sincronía Lunar + Vectorización de 3er Orden.
        </p>
    </div>
</div>

<script>
    const PATRONES = {
        "Super Astro Luna": 11296541, "Dorado Noche": 46914612, "Chontico": 386529, 
        "Sinuano": 195311, "Cafeterito": 315526, "Motilón": 462939, "Culona": 33965,
        "Antioqueñita": 156964, "Pijao Oro": 79116, "Saman": 119141
    };

    let historial = [];

    // Llenar selector
    const sel = document.getElementById('lotSelect');
    Object.keys(PATRONES).sort().forEach(l => {
        let opt = document.createElement('option');
        opt.value = l; opt.innerText = l;
        sel.appendChild(opt);
    });

    function verificar() {
        if(document.getElementById('pass').value.toUpperCase() === "TESLA369") {
            document.getElementById('bloqueo').style.fadeOut = "slow";
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else { alert("ACCESO DENEGADO"); }
    }

    function addHistorial() {
        const val = document.getElementById('histIn').value;
        if(val.length === 4) {
            historial.unshift(val);
            document.getElementById('histLog').innerText = "DATA: " + historial.join(" | ");
            document.getElementById('histIn').value = "";
        }
    }

    // --- CÁLCULOS AVANZADOS ---

    // 1. Fase Lunar (Calcula la iluminación de 0 a 1)
    function getLunarPhase() {
        const now = new Date();
        const lp = 2551443; 
        const newMoon = new Date(1970, 0, 7, 20, 35, 0);
        const phase = ((now.getTime() - newMoon.getTime()) / 1000) % lp;
        return phase / lp;
    }

    // 2. Filtros de Calidad Probabilística
    function esPremium(num) {
        let d = num.split('').map(Number);
        let suma = d.reduce((a, b) => a + b, 0);
        
        // Regla de Tesla: La raíz debe tender a 3, 6 o 9
        let raiz = (suma - 1) % 9 + 1;
        let esTesla = [3, 6, 9].includes(raiz);
        
        // Filtro de paridad equilibrada (no todos pares, no todos impares)
        let pares = d.filter(x => x % 2 === 0).length;
        let esEquilibrado = (pares >= 1 && pares <= 3);

        return esTesla && esEquilibrado;
    }

    function procesarCalculo() {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resFinal').style.display = 'none';

        setTimeout(() => {
            realizarProyeccion();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('resFinal').style.display = 'block';
        }, 1500);
    }

    function realizarProyeccion() {
        const lot = document.getElementById('lotSelect').value;
        const patron = PATRONES[lot];
        const luna = getLunarPhase();
        const t = new Date().getDate();
        
        // Semilla de Convergencia (Paso Maestro)
        // $$S = \frac{Patron \cdot \Phi_{L}}{Día}$$
        let semilla = Math.floor((patron * (1 + luna)) / t);
        let base = semilla.toString().slice(-4).padStart(4, '0');

        let sugerencias = [];
        let intentos = 0;

        while(sugerencias.length < 6 && intentos < 1000) {
            intentos++;
            let n = "";
            let randomTesla = [3, 6, 9][Math.floor(Math.random()*3)];
            
            // Transformación Vectorial
            n = base.split('').map((digit, idx) => {
                let v = (parseInt(digit) + randomTesla + (historial.length > 0 ? parseInt(historial[0][idx]) : idx)) % 10;
                return v;
            }).join('');

            if(esPremium(n) && !sugerencias.includes(n)) {
                sugerencias.push(n);
            }
        }

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        sugerencias.forEach((n, i) => {
            grid.innerHTML += `
                <div class="num-card">
                    <span style="font-size:0.6rem; opacity:0.6;">VECTOR PRO ${i+1}</span>
                    <span class="num-val">${n}</span>
                </div>`;
        });
    }
</script>
</body>
</html>
